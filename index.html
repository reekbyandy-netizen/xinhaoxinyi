<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>新濠信義｜事業在信義 生活享大安</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #b89660;
      --gold-light: #d4b483;
      --white: #ffffff;
      --off-white: #f8f5f0;
      --cream: #f0ebe3;
      --dark: #1a1a1a;
      --text: #2c2c2c;
      --muted: #7a7060;
      --border: #ddd5c5;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--white);
      color: var(--text);
      font-family: 'Noto Serif TC', serif;
      font-weight: 300;
      letter-spacing: 0.06em;
      overflow-x: hidden;
    }

    /* ─── 導覽列 ─── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: rgba(255,255,255,0.96);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 60px;
      backdrop-filter: blur(8px);
      transition: padding 0.4s ease, box-shadow 0.4s ease;
    }
    nav.scrolled {
      padding: 12px 60px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.08);
    }
    .nav-logo {
      height: 44px;
      filter: invert(1);
      transition: height 0.4s ease;
    }
    nav.scrolled .nav-logo { height: 32px; }
    .nav-links { display: flex; gap: 40px; }
    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 0.2em;
      position: relative;
      transition: color 0.3s;
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -3px; left: 0; right: 0;
      height: 1px;
      background: var(--gold);
      transform: scaleX(0);
      transition: transform 0.3s ease;
    }
    .nav-links a:hover { color: var(--gold); }
    .nav-links a:hover::after { transform: scaleX(1); }

    /* ─── HERO ─── */
    .hero {
      height: 100vh;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background-image: url('images/hero.jpg');
      background-size: cover;
      background-position: center;
      transform: scale(1.08);
      animation: heroZoom 8s ease forwards;
    }
    @keyframes heroZoom {
      to { transform: scale(1); }
    }
    .hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(255,255,255,0.1) 0%,
        rgba(255,255,255,0.4) 60%,
        rgba(255,255,255,0.88) 100%
      );
    }
    .hero-content {
      position: relative; z-index: 2;
      display: flex; flex-direction: column;
      align-items: center;
      opacity: 0;
      animation: fadeUp 1.2s ease 0.4s forwards;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .hero-logo {
      width: min(320px, 72vw);
      margin-bottom: 36px;
      filter: invert(1);
    }
    .hero-line {
      width: 1px; height: 0;
      background: linear-gradient(to bottom, var(--gold), transparent);
      margin: 0 auto 0;
      animation: lineGrow 0.8s ease 1.2s forwards;
    }
    @keyframes lineGrow {
      to { height: 56px; margin-bottom: 28px; }
    }
    .hero-tagline {
      font-size: clamp(18px, 3vw, 28px);
      font-weight: 400;
      letter-spacing: 0.4em;
      color: var(--dark);
      line-height: 1.8;
      opacity: 0;
      animation: fadeUp 1s ease 1.6s forwards;
    }
    .hero-tagline span { color: var(--gold); }
    .hero-scroll {
      position: absolute; bottom: 36px; left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      opacity: 0;
      animation: fadeIn 1s ease 2.2s forwards;
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }
    .hero-scroll-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--gold);
      animation: bounce 1.6s infinite;
    }
    @keyframes bounce {
      0%,100% { transform: translateY(0); opacity:1; }
      50% { transform: translateY(8px); opacity:0.4; }
    }

    /* ─── 共用 section ─── */
    .section-wrap { padding: 100px 0; }
    .inner { max-width: 1080px; margin: 0 auto; padding: 0 48px; }
    .sec-label {
      display: inline-block;
      font-size: 11px;
      letter-spacing: 0.5em;
      color: var(--gold);
      border-bottom: 1px solid var(--gold-light);
      padding-bottom: 6px;
      margin-bottom: 20px;
    }
    .gold-bar {
      width: 48px; height: 1px;
      background: var(--gold);
      margin: 20px auto 0;
    }

    /* ─── 滾動淡入動畫 ─── */
    .reveal {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .reveal-left {
      opacity: 0;
      transform: translateX(-40px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    .reveal-left.visible {
      opacity: 1;
      transform: translateX(0);
    }
    .reveal-delay-1 { transition-delay: 0.1s; }
    .reveal-delay-2 { transition-delay: 0.2s; }
    .reveal-delay-3 { transition-delay: 0.3s; }

    /* ─── 空拍圖 ─── */
    .aerial-img {
      width: 100%;
      height: 100vw;
      max-height: 600px;
      object-fit: cover;
      display: block;
    }
    .aerial-placeholder {
      width: 100%;
      height: 100vw;
      max-height: 600px;
      background: var(--cream);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px;
      border: 1px dashed var(--border);
    }
    .aerial-placeholder p { color: var(--muted); font-size: 14px; letter-spacing: 0.3em; }

    /* ─── 規格數字條 ─── */
    .specs-bar {
      display: grid;
      background: var(--dark);
    }
    .spec-item {
      padding: 48px 32px;
      text-align: center;
      border-right: 1px solid rgba(255,255,255,0.07);
    }
    .spec-item:last-child { border-right: none; }
    .spec-num {
      font-size: 40px;
      font-weight: 300;
      color: var(--gold);
      letter-spacing: 0.1em;
      line-height: 1;
      display: inline-block;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .spec-item.visible .spec-num {
      opacity: 1;
      transform: translateY(0);
    }
    .spec-item:nth-child(2) .spec-num { transition-delay: 0.15s; }
    .spec-item:nth-child(3) .spec-num { transition-delay: 0.3s; }
    .spec-unit { font-size: 15px; color: var(--gold-light); }

    /* ─── 周邊環境輪播 ─── */
    .carousel-wrap {
      position: relative;
      overflow: hidden;
      background: var(--cream);
    }
    .carousel-track {
      display: flex;
      transition: transform 0.6s cubic-bezier(0.4,0,0.2,1);
    }
    .carousel-slide {
      min-width: 100%;
      width: 100%;
      height: 100vw;
      max-height: 600px;
      object-fit: cover;
      display: block;
      flex-shrink: 0;
    }
    .carousel-placeholder {
      min-width: 100%;
      height: 100vw;
      max-height: 600px;
      background: var(--cream);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px;
      border: 1px dashed var(--border);
      flex-shrink: 0;
    }
    .carousel-placeholder p { color: var(--muted); font-size: 14px; letter-spacing: 0.3em; }
    .carousel-btn {
      position: absolute; top: 50%; transform: translateY(-50%);
      z-index: 10;
      background: rgba(255,255,255,0.85);
      border: 1px solid var(--border);
      color: var(--gold);
      width: 48px; height: 48px;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.3s, transform 0.3s;
    }
    .carousel-btn:hover {
      background: var(--white);
      transform: translateY(-50%) scale(1.1);
    }
    .carousel-btn.prev { left: 20px; }
    .carousel-btn.next { right: 20px; }
    .carousel-dots {
      display: flex; justify-content: center; gap: 8px;
      padding: 20px 0;
      background: var(--off-white);
    }
    .carousel-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--border);
      cursor: pointer;
      border: none;
      transition: background 0.3s, transform 0.3s;
    }
    .carousel-dot.active {
      background: var(--gold);
      transform: scale(1.3);
    }

    /* ─── CTA ─── */
    .cta-wrap {
      background: var(--off-white);
      text-align: center;
      padding: 120px 40px;
      border-top: 1px solid var(--border);
    }
    .cta-title {
      font-size: clamp(26px, 4vw, 44px);
      font-weight: 400;
      letter-spacing: 0.4em;
      color: var(--dark);
      margin-bottom: 16px;
    }
    .cta-sub {
      font-size: 15px;
      letter-spacing: 0.2em;
      color: var(--muted);
      line-height: 2.2;
      margin-bottom: 56px;
    }
    .cta-btn {
      display: inline-block;
      padding: 18px 72px;
      background: var(--dark);
      color: var(--gold);
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 0.4em;
      font-family: 'Noto Serif TC', serif;
      border: 1px solid var(--dark);
      position: relative;
      overflow: hidden;
      transition: color 0.4s ease, border-color 0.4s ease;
    }
    .cta-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--gold);
      transform: translateX(-101%);
      transition: transform 0.4s ease;
    }
    .cta-btn:hover { color: #fff; border-color: var(--gold); }
    .cta-btn:hover::before { transform: translateX(0); }
    .cta-btn span { position: relative; z-index: 1; }

    /* ─── Footer ─── */
    footer {
      background: var(--dark);
      text-align: center;
      padding: 48px 24px;
      font-size: 12px;
      letter-spacing: 0.25em;
      color: rgba(255,255,255,0.3);
      line-height: 2;
    }
    footer .foot-logo { height: 32px; margin-bottom: 16px; opacity: 0.7; }

    /* ─── RWD ─── */
    @media (max-width: 800px) {
      nav { padding: 14px 20px; }
      nav.scrolled { padding: 10px 20px; }
      .nav-links { display: none; }
      .inner { padding: 0 20px; }
      .section-wrap { padding: 70px 0; }
      .specs-bar { grid-template-columns: 1fr 1fr 1fr !important; }
      .spec-item { padding: 32px 16px; }
      .spec-num { font-size: 28px; }
    }
  </style>
</head>
<body>

  <!-- ═══ 導覽列 ═══ -->
  <nav id="mainNav">
    <img class="nav-logo" src="260227-115 新濠信義LOGO字(白色).png"
         onerror="this.style.display='none'; this.nextElementSibling.style.display='block'"
         alt="新濠信義"/>
    <span style="display:none; font-size:18px; letter-spacing:0.3em; color:#1a1a1a;">新濠信義</span>
    <div class="nav-links">
      <a href="#hero">首頁</a>
      <a href="#aerial">空拍圖</a>
      <a href="#env">周邊環境</a>
      <a href="#reserve">客戶預約</a>
    </div>
  </nav>

  <!-- ═══ 首頁 HERO ═══ -->
  <section class="hero" id="hero">
    <div class="hero-bg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <img class="hero-logo" src="260227-115 新濠信義LOGO字(白色).png" alt="新濠信義"/>
      <div class="hero-line"></div>
      <h1 class="hero-tagline">
        事業在<span>信義</span>、生活享<span>大安</span>
      </h1>
    </div>
    <div class="hero-scroll">
      <div class="hero-scroll-dot"></div>
    </div>
  </section>

  <!-- ═══ 空拍圖 ═══ -->
  <div id="aerial">
    <!--
      有圖時請改為：
      <img class="aerial-img" src="images/aerial.jpg" alt="空拍圖"/>
    -->
    <div class="aerial-placeholder reveal">
      <p>空拍圖（圖片提供後放置）</p>
    </div>

    <!-- 規格數字條 -->
    <div class="specs-bar" style="grid-template-columns: repeat(3,1fr);">
      <div class="spec-item">
        <div class="spec-num">68<span class="spec-unit">戶</span></div>
      </div>
      <div class="spec-item">
        <div class="spec-num">1~2<span class="spec-unit">房</span></div>
      </div>
      <div class="spec-item">
        <div class="spec-num">10~26<span class="spec-unit">坪</span></div>
      </div>
    </div>
  </div>

  <!-- ═══ 周邊環境 ═══ -->
  <div id="env" style="background:var(--off-white);">
    <div class="carousel-wrap">
      <div class="carousel-track" id="carouselTrack">
        <!--
          圖片提供後替換為：
          <img class="carousel-slide" src="images/env1.jpg" alt="周邊環境"/>
        -->
        <div class="carousel-placeholder"><p>周邊環境圖 1</p></div>
        <div class="carousel-placeholder"><p>周邊環境圖 2</p></div>
        <div class="carousel-placeholder"><p>周邊環境圖 3</p></div>
      </div>
      <button class="carousel-btn prev" onclick="moveCarousel(-1)">&#8592;</button>
      <button class="carousel-btn next" onclick="moveCarousel(1)">&#8594;</button>
    </div>
    <div class="carousel-dots" id="carouselDots">
      <button class="carousel-dot active" onclick="goToSlide(0)"></button>
      <button class="carousel-dot" onclick="goToSlide(1)"></button>
      <button class="carousel-dot" onclick="goToSlide(2)"></button>
    </div>
  </div>

  <!-- ═══ 客戶預約 ═══ -->
  <div class="cta-wrap" id="reserve">
    <p class="sec-label reveal" style="display:block; text-align:center; margin-bottom:20px;">客戶預約</p>
    <h2 class="cta-title reveal reveal-delay-1">預約專屬賞屋</h2>
    <p class="cta-sub reveal reveal-delay-2">
      事業在信義，生活享大安<br/>
      填寫資料，專人為您安排一對一參觀
    </p>
    <div class="reveal reveal-delay-3">
      <a class="cta-btn"
         href="https://www.surveycake.com/s/k8Dl9"
         target="_blank"
         rel="noopener noreferrer">
        <span>立即預約</span>
      </a>
    </div>
    <p class="reveal" style="color:var(--muted); margin-top:24px; font-size:12px; letter-spacing:0.2em;">點選後將跳轉至預約表單</p>
  </div>

  <!-- ═══ Footer ═══ -->
  <footer>
    <img class="foot-logo" src="260227-115 新濠信義LOGO字(白色).png" alt="新濠信義"/>
    <p>台北市信義區崇德街｜預售建案｜版權所有</p>
  </footer>

  <script>
    // ── 導覽列滾動縮小 ──
    const nav = document.getElementById('mainNav');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 60);
    });

    // ── 滾動淡入 ──
    function initReveal() {
      const allReveal = document.querySelectorAll('.reveal, .reveal-left');
      const specItems = document.querySelectorAll('.spec-item');

      if ('IntersectionObserver' in window) {
        const obs = new IntersectionObserver((entries) => {
          entries.forEach(e => {
            if (e.isIntersecting) {
              e.target.classList.add('visible');
              obs.unobserve(e.target);
            }
          });
        }, { threshold: 0, rootMargin: '0px 0px -60px 0px' });

        allReveal.forEach(el => obs.observe(el));

        const specObs = new IntersectionObserver((entries) => {
          entries.forEach(e => {
            if (e.isIntersecting) {
              e.target.classList.add('visible');
              specObs.unobserve(e.target);
            }
          });
        }, { threshold: 0, rootMargin: '0px 0px -40px 0px' });

        specItems.forEach(el => specObs.observe(el));
      } else {
        // 瀏覽器不支援時直接顯示
        allReveal.forEach(el => el.classList.add('visible'));
        specItems.forEach(el => el.classList.add('visible'));
      }

      // 保險：3秒後強制顯示所有元素
      setTimeout(() => {
        allReveal.forEach(el => el.classList.add('visible'));
        specItems.forEach(el => el.classList.add('visible'));
      }, 3000);
    }

    document.addEventListener('DOMContentLoaded', initReveal);

    // ── 輪播 ──
    let current = 0;
    const total = 3;

    function moveCarousel(dir) {
      current = (current + dir + total) % total;
      updateCarousel();
    }
    function goToSlide(n) {
      current = n;
      updateCarousel();
    }
    function updateCarousel() {
      document.getElementById('carouselTrack').style.transform = `translateX(-${current * 100}%)`;
      document.querySelectorAll('.carousel-dot').forEach((d, i) => {
        d.classList.toggle('active', i === current);
      });
    }
    setInterval(() => moveCarousel(1), 4000);
  </script>

</body>
</html>
